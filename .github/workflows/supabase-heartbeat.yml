yamlname: Supabase Heartbeat – Celles Planner

on:
  schedule:
    - cron: '0 8 * * 1,4'
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Debug
        run: echo "URL=${{ secrets.SUPABASE_URL }}"

      - name: Ping Supabase
        run: |
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --header "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            --header "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "✅ Supabase Celles Planner is actief."
          else
            echo "❌ Onverwachte statuscode: $STATUS"
            exit 1
          fi
