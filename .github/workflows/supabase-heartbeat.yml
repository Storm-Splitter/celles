name: Supabase Heartbeat – Celles Planner

on:
  schedule:
    - cron: '0 8 * * 1,4'   # Elke maandag en donderdag om 08:00 UTC
  workflow_dispatch:          # Ook handmatig te starten via GitHub UI

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (INSERT)
        run: |
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --request POST \
            --header "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            --header "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            --header "Content-Type: application/json" \
            --header "Prefer: return=representation" \
            --data '{"pinged_at": "now()"}' \
            "${{ secrets.SUPABASE_URL }}/rest/v1/heartbeat")
          echo "INSERT status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "✅ INSERT geslaagd."
          else
            echo "❌ INSERT mislukt: $STATUS"
            exit 1
          fi

      - name: Ping Supabase (DELETE)
        run: |
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --request DELETE \
            --header "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            --header "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/heartbeat?id=gte.1")
          echo "DELETE status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "✅ DELETE geslaagd."
          else
            echo "❌ DELETE mislukt: $STATUS"
            exit 1
          fi
